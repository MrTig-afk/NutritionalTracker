<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- maximum-scale=1 stops iOS from auto-zooming when focusing inputs with
         font-size < 16px (user pinch-zoom still works; iOS ignores it for gestures) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#006D77" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NutriScan" />
    <title>NutriScan</title>
    <meta name="description" content="Photograph any nutrition label and get the calories, protein, carbs, fat and fibre instantly. No barcodes, no typing." />

    <!-- Link preview (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NutriScan" />
    <meta property="og:title" content="NutriScan: read any nutrition label from a photo" />
    <meta property="og:description" content="Photograph a label. Get the macros. No barcodes, no typing, just your camera." />
    <meta property="og:url" content="https://nutritional-tracker-delta.vercel.app" />
    <meta property="og:image" content="https://nutritional-tracker-delta.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NutriScan: read any nutrition label from a photo" />
    <meta name="twitter:description" content="Photograph a label. Get the macros. No barcodes, no typing, just your camera." />
    <meta name="twitter:image" content="https://nutritional-tracker-delta.vercel.app/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts load async so a slow network never blocks first paint -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
